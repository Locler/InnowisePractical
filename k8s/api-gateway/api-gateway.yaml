apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-auth-service
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-service..."
              until nc -z auth-service 8081; do echo waiting; sleep 2; done
        - name: wait-for-user-service
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for user-service..."
              until nc -z user-service 8082; do echo waiting; sleep 2; done
        - name: wait-for-order-service
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for order-service..."
              until nc -z order-service 8083; do echo waiting; sleep 2; done
        - name: wait-for-payment-service
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for payment-service..."
              until nc -z payment-service 8084; do echo waiting; sleep 2; done
      containers:
        - name: api-gateway
          image: innowisepractical-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: GATEWAY_BASE
              value: http://api-gateway:8080
            - name: SERVICES_AUTH
              value: http://auth-service:8081
            - name: SERVICES_USER
              value: http://user-service:8082
            - name: SERVICES_ORDER
              value: http://order-service:8083
            - name: SERVICES_PAYMENT
              value: http://payment-service:8084
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
